# Base hyperparameters shared across all conditions.
# Per-condition configs inherit from this and override only what differs.

env:
  train_seeds: null        # populated per-env config
  test_seeds: null
  test_fraction: 0.2
  num_envs: 4
  max_episode_steps: 500

encoder:
  latent_dim: 256

predictor:
  num_layers: 2
  num_heads: 4
  horizon: 5               # K

ppo:
  learning_rate: 3.0e-4
  n_steps: 128             # rollout length per env
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  total_timesteps: 5_000_000

aux:
  lambda_pred: 0.1
  lambda_cons: 0.1         # set to 0 for no-consistency conditions

logging:
  log_interval: 10         # PPO update intervals
  eval_interval: 50        # update intervals between evaluations
  eval_episodes: 50        # episodes per evaluation
  latent_save_interval: 250  # update intervals between latent snapshots
  latent_eval_episodes: 50
  use_wandb: false
  project: "mhac"
